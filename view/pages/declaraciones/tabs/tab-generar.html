<!-- generar obligaciones del mes -->
<div id="tab-generar" class="hidden">
    <div class="mb-4">
        <h2 class="text-lg font-bold text-slate-800">Generar Obligaciones del Mes</h2>
        <p class="text-sm text-slate-400">Genera automáticamente las declaraciones pendientes para todos los clientes
            activos según sus regímenes</p>
    </div>

    <div class="card p-5" style="max-width:500px">
        <div class="flex flex-col gap-4">
            <div class="alert alert-info">
                <i class="bi bi-info-circle"></i>
                <span>Esta acción revisará los regímenes de cada cliente y creará las declaraciones que falten para el
                    periodo seleccionado.</span>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="form-group">
                    <label class="form-label">Mes</label>
                    <select class="form-input" id="gen-mes">
                        <option value="1">Enero</option>
                        <option value="2">Febrero</option>
                        <option value="3">Marzo</option>
                        <option value="4">Abril</option>
                        <option value="5">Mayo</option>
                        <option value="6">Junio</option>
                        <option value="7">Julio</option>
                        <option value="8">Agosto</option>
                        <option value="9">Septiembre</option>
                        <option value="10">Octubre</option>
                        <option value="11">Noviembre</option>
                        <option value="12">Diciembre</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Año</label>
                    <select class="form-input" id="gen-anio"></select>
                </div>
            </div>

            <div id="gen-result" class="hidden">
                <div class="alert alert-success">
                    <i class="bi bi-check-circle"></i>
                    <span id="gen-result-msg"></span>
                </div>
            </div>

            <button class="btn btn-primary" id="btn-gen-obligaciones">
                <i class="bi bi-magic"></i> Generar
            </button>
        </div>
    </div>
</div>
