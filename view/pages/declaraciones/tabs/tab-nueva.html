<!-- nueva declaracion -->
<div id="tab-nueva" class="hidden">
    <div class="mb-4">
        <h2 class="text-lg font-bold text-slate-800">Nueva Declaración</h2>
        <p class="text-sm text-slate-400">Registra una declaración fiscal para un cliente</p>
    </div>

    <div class="card p-5" style="max-width:650px">
        <form id="form-new-decl" novalidate class="flex flex-col gap-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="form-group" style="grid-column: span 2">
                    <label class="form-label" for="new-decl-cliente">Cliente *</label>
                    <select class="form-input" id="new-decl-cliente">
                        <option value="">— Selecciona un cliente —</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="new-decl-obligacion">Obligación Fiscal *</label>
                <select class="form-input" id="new-decl-obligacion">
                    <option value="">— Selecciona la obligación —</option>
                </select>
                <p class="text-xs text-slate-400 mt-1" id="new-decl-obl-hint">Las obligaciones dependen de los regímenes
                    del cliente seleccionado.</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="form-group">
                    <label class="form-label" for="new-decl-mes">Mes *</label>
                    <select class="form-input" id="new-decl-mes">
                        <option value="">Mes</option>
                        <option value="1">Enero</option>
                        <option value="2">Febrero</option>
                        <option value="3">Marzo</option>
                        <option value="4">Abril</option>
                        <option value="5">Mayo</option>
                        <option value="6">Junio</option>
                        <option value="7">Julio</option>
                        <option value="8">Agosto</option>
                        <option value="9">Septiembre</option>
                        <option value="10">Octubre</option>
                        <option value="11">Noviembre</option>
                        <option value="12">Diciembre</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="new-decl-anio">Año *</label>
                    <select class="form-input" id="new-decl-anio">
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="new-decl-fecha-limite">Fecha Límite</label>
                <input class="form-input" type="date" id="new-decl-fecha-limite">
            </div>

            <div class="form-group">
                <label class="form-label">Resultado fiscal</label>
                <div class="flex rounded-lg border border-slate-200 overflow-hidden mb-2" id="decl-tipo-toggle" role="group" aria-label="Tipo de resultado fiscal">
                    <button type="button" id="btn-tipo-pagar"
                            class="flex-1 py-2 px-3 text-sm font-medium transition-colors bg-blue-600 text-white"
                            aria-pressed="true">
                        <i class="bi bi-arrow-up-right-circle mr-1" aria-hidden="true"></i>A Pagar
                    </button>
                    <button type="button" id="btn-tipo-favor"
                            class="flex-1 py-2 px-3 text-sm font-medium transition-colors bg-white text-slate-500 hover:bg-slate-50"
                            aria-pressed="false">
                        <i class="bi bi-arrow-down-left-circle mr-1" aria-hidden="true"></i>Saldo a Favor
                    </button>
                </div>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm select-none">$</span>
                    <input class="form-input pl-7" type="number" step="0.01" min="0" id="new-decl-importe"
                           placeholder="0.00" aria-label="Monto">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="new-decl-obs">Observaciones</label>
                <textarea class="form-input" id="new-decl-obs" rows="3" placeholder="Notas adicionales..."></textarea>
            </div>

            <div id="form-new-decl-error" class="alert alert-error hidden">
                <i class="bi bi-exclamation-circle"></i>
                <span id="form-new-decl-error-msg"></span>
            </div>

            <div>
                <button type="button" class="btn btn-primary" id="btn-create-decl">
                    <i class="bi bi-plus-circle"></i> Crear Declaración
                </button>
            </div>
        </form>
    </div>
</div>
