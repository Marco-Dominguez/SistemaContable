<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil — Conta⅃ink</title>
    <meta name="description" content="Actualiza tu información personal y contraseña.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=Sora:wght@600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/view/assets/css/app.css?v=2">
    <link rel="icon" href="/view/assets/img/Isotipo.svg" type="image/svg+xml">
    <!-- google tag -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-H55HB0QW2W"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag("js", new Date());
        gtag("config", "G-H55HB0QW2W");
    </script>
</head>

<body>
    <div id="app">
        <!-- sidebar -->
        <aside id="sidebar"></aside>

        <div id="main">
            <header id="topbar">
                <div class="flex items-center gap-3">
                    <button id="sidebar-toggle" class="btn btn-outline btn-icon" aria-label="Abrir menú de navegación">
                        <i class="bi bi-list text-lg" aria-hidden="true"></i>
                    </button>
                    <nav class="text-sm text-slate-400">
                        <span>Cuenta</span>
                        <span class="mx-1">/</span>
                        <span class="text-slate-700 font-medium">Mi Perfil</span>
                    </nav>
                </div>
                <div class="flex items-center gap-4">
                    <!-- notificaciones -->
                    <div class="relative" id="notif-wrapper">
                        <button class="btn btn-outline btn-icon btn-sm" id="btn-notif" aria-label="Notificaciones"
                            aria-haspopup="true" aria-expanded="false">
                            <i class="bi bi-bell" aria-hidden="true"></i>
                            <span class="notif-badge hidden" id="notif-count" aria-hidden="true">0</span>
                        </button>
                        <div class="notif-dropdown hidden" id="notif-dropdown"></div>
                    </div>
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-medium text-slate-700" id="topbar-user-name">—</p>
                        <p class="text-xs text-slate-400" id="topbar-user-role">—</p>
                    </div>
                    <button id="btn-logout" class="btn btn-outline btn-sm">
                        <i class="bi bi-box-arrow-right"></i>
                        <span class="hidden sm:inline">Salir</span>
                    </button>
                </div>
            </header>

            <main id="page-content">
                <!-- encabezado -->
                <div class="mb-6">
                    <h1 class="text-xl font-bold text-slate-800">
                        <i class="bi bi-person-circle mr-2 text-blue-600"></i>Mi Perfil
                    </h1>
                    <p class="text-sm text-slate-400">Actualiza tu información personal y contraseña.</p>
                </div>

                <!-- card: información personal -->
                <div class="card p-5 mb-6" style="max-width:560px">
                    <h2 class="text-base font-semibold text-slate-700 mb-4">Información personal</h2>

                    <div id="profile-loading" class="p-4 text-center text-slate-400">
                        <div class="spinner mx-auto mb-2"></div>
                        Cargando...
                    </div>

                    <form id="form-profile" class="flex flex-col gap-4 hidden" novalidate>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="form-group">
                                <label class="form-label" for="profile-nombre">Nombre <span
                                        class="text-red-500">*</span></label>
                                <input class="form-input" type="text" id="profile-nombre" autocomplete="given-name"
                                    required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="profile-apellidos">Apellidos <span
                                        class="text-red-500">*</span></label>
                                <input class="form-input" type="text" id="profile-apellidos" autocomplete="family-name"
                                    required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="profile-email">Correo electrónico</label>
                            <input class="form-input" type="email" id="profile-email" autocomplete="email">
                        </div>

                        <div id="profile-error" class="alert alert-error hidden" role="alert">
                            <i class="bi bi-exclamation-circle" aria-hidden="true"></i>
                            <span id="profile-error-msg"></span>
                        </div>

                        <div class="flex justify-end">
                            <button type="button" class="btn btn-primary" id="btn-save-profile">
                                <i class="bi bi-save" aria-hidden="true"></i> Guardar cambios
                            </button>
                        </div>
                    </form>
                </div>

                <!-- card: cambiar contraseña -->
                <div class="card p-5" style="max-width:560px">
                    <h2 class="text-base font-semibold text-slate-700 mb-4">Cambiar contraseña</h2>
                    <form id="form-password" class="flex flex-col gap-4" novalidate>
                        <div class="form-group">
                            <label class="form-label" for="current-password">Contraseña actual <span
                                    class="text-red-500">*</span></label>
                            <input class="form-input" type="password" id="current-password"
                                autocomplete="current-password">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="new-password">Nueva contraseña <span
                                    class="text-red-500">*</span></label>
                            <input class="form-input" type="password" id="new-password"
                                placeholder="Mínimo 8 caracteres" autocomplete="new-password">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="confirm-password">Confirmar nueva contraseña <span
                                    class="text-red-500">*</span></label>
                            <input class="form-input" type="password" id="confirm-password" autocomplete="new-password">
                        </div>

                        <div id="pass-error" class="alert alert-error hidden" role="alert">
                            <i class="bi bi-exclamation-circle" aria-hidden="true"></i>
                            <span id="pass-error-msg"></span>
                        </div>

                        <div class="flex justify-end">
                            <button type="button" class="btn btn-primary" id="btn-save-password">
                                <i class="bi bi-lock" aria-hidden="true"></i> Cambiar contraseña
                            </button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <script src="/view/assets/js/app.js?v=2"></script>
    <script src="/view/pages/auth/profile.js"></script>
</body>

</html>
