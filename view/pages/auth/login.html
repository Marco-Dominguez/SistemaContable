<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Sistema Contable</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/SistemaContable/view/assets/css/app.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 25px 80px rgba(0,0,0,.35);
            width: 100%; max-width: 420px;
            padding: 2.5rem;
        }
        .login-brand .icon {
            width: 52px; height: 52px; border-radius: 14px;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1.4rem; margin: 0 auto 1rem;
        }
        .divider {
            height: 1px; background: #e2e8f0; margin: 1.5rem 0;
        }
        #btn-login {
            width: 100%; padding: .7rem;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: #fff; border: none; border-radius: 10px;
            font-size: .95rem; font-weight: 600; cursor: pointer;
            transition: opacity .2s, transform .1s;
            display: flex; align-items: center; justify-content: center; gap: .5rem;
        }
        #btn-login:hover  { opacity: .9; }
        #btn-login:active { transform: scale(.98); }
        #btn-login:disabled { opacity: .7; cursor: not-allowed; }

        .show-pass {
            position: absolute; right: .75rem; top: 50%; transform: translateY(-50%);
            color: #94a3b8; cursor: pointer; font-size: 1rem; border: none; background: none;
        }
        .show-pass:hover { color: #475569; }
    </style>
</head>
<body class="items-center justify-center p-4">

<div class="login-card">
    <!-- Brand -->
    <div class="login-brand text-center">
        <div class="icon"><i class="bi bi-calculator-fill"></i></div>
        <h1 class="text-xl font-bold text-slate-800">Sistema Contable</h1>
        <p class="text-sm text-slate-500 mt-1">Control de declaraciones fiscales</p>
    </div>

    <div class="divider"></div>

    <!-- Alert -->
    <div id="login-alert" class="alert alert-error mb-4 hidden">
        <i class="bi bi-exclamation-circle"></i>
        <span id="login-alert-msg">Error</span>
    </div>

    <!-- Form -->
    <form id="login-form" novalidate>
        <div class="flex flex-col gap-4">
            <div class="form-group">
                <label class="form-label" for="email">Correo electrónico</label>
                <input class="form-input" type="email" id="email" name="email"
                       placeholder="usuario@ejemplo.com" autocomplete="email" required>
                <span class="form-error hidden" id="email-err"></span>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <div class="relative">
                    <input class="form-input pr-10 w-full" type="password" id="password"
                           name="password" placeholder="••••••••" autocomplete="current-password" required>
                    <button type="button" class="show-pass" id="toggle-pass">
                        <i class="bi bi-eye" id="pass-icon"></i>
                    </button>
                </div>
                <span class="form-error hidden" id="pass-err"></span>
            </div>

            <button type="submit" id="btn-login" class="mt-2">
                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
            </button>
        </div>
    </form>

    <p class="text-center text-xs text-slate-400 mt-6">
        &copy; <span id="year"></span> Sistema Contable — Todos los derechos reservados
    </p>
</div>

<script src="/SistemaContable/view/assets/js/app.js"></script>
<script src="/SistemaContable/view/pages/auth/login.js"></script>
</body>
</html>
