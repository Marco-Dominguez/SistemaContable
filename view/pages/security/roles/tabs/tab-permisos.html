<!-- módulos y acciones (matriz editable) -->
<div id="tab-permisos" class="hidden" role="tabpanel" aria-labelledby="tab-btn-permisos">
    <div class="flex items-center justify-between mb-4">
        <div>
            <h2 class="text-lg font-bold text-slate-800">Módulos y Acciones</h2>
            <p class="text-sm text-slate-400">Define qué acciones están disponibles en cada módulo</p>
        </div>
    </div>

    <div class="alert mb-4" style="display:flex;gap:0.5rem;align-items:flex-start;background:#fefce8;border:1px solid #fde047;border-radius:0.75rem;padding:0.75rem 1rem;">
        <i class="bi bi-exclamation-triangle text-yellow-600 mt-0.5"></i>
        <span class="text-sm text-yellow-800">Quitar una acción de un módulo eliminará automáticamente ese permiso de todos los roles que lo tengan asignado.</span>
    </div>

    <div class="card overflow-hidden">
        <div id="matriz-loading" class="p-8 text-center text-slate-400">
            <div class="spinner mx-auto mb-2"></div>
            Cargando matriz...
        </div>
        <div id="matriz-table-wrap" class="hidden overflow-x-auto p-4">
            <table class="perm-table" id="matriz-table"></table>
        </div>
    </div>
</div>
