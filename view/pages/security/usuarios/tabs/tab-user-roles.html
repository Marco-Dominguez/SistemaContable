<!-- tab: asignar roles a usuario -->
<div id="tab-user-roles" class="hidden">
    <div class="mb-4">
        <h2 class="text-lg font-bold text-slate-800">Asignar Roles a Usuarios</h2>
        <p class="text-sm text-slate-400">Selecciona un usuario para ver y editar sus roles</p>
    </div>

    <div class="card p-5">
        <div class="form-group mb-4">
            <label class="form-label">Selecciona un usuario</label>
            <select id="sel-user-for-roles" class="form-input">
                <option value="">— Selecciona —</option>
            </select>
        </div>

        <div id="user-roles-panel" class="hidden">
            <p class="text-sm font-semibold text-slate-600 mb-3">Roles disponibles:</p>
            <div id="roles-checkboxes" class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4"></div>
            <button class="btn btn-primary" id="btn-save-user-roles">
                <i class="bi bi-save"></i> Guardar Roles
            </button>
        </div>
    </div>
</div>
