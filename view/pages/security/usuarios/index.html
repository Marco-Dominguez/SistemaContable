<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios — Sistema Contable</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/view/assets/css/app.css">
    <!-- google tag -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-H55HB0QW2W"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag("js", new Date());
        gtag("config", "G-H55HB0QW2W");
    </script>
</head>

<body>
    <div id="app">

        <!-- sidebar -->
        <aside id="sidebar"></aside>

        <div id="main">
            <header id="topbar">
                <div class="flex items-center gap-3">
                    <button id="sidebar-toggle" class="btn btn-outline btn-icon" aria-label="Abrir menú de navegación">
                        <i class="bi bi-list text-lg" aria-hidden="true"></i>
                    </button>
                    <nav class="text-sm text-slate-400">
                        <span>Seguridad</span>
                        <span class="mx-1">/</span>
                        <span class="text-slate-700 font-medium">Usuarios</span>
                    </nav>
                </div>
                <div class="flex items-center gap-4">
                    <div class="relative" id="notif-wrapper">
                        <button class="btn btn-outline btn-icon btn-sm" id="btn-notif" aria-label="Notificaciones" aria-haspopup="true" aria-expanded="false">
                            <i class="bi bi-bell" aria-hidden="true"></i>
                            <span class="notif-badge hidden" id="notif-count" aria-hidden="true">0</span>
                        </button>
                        <div class="notif-dropdown hidden" id="notif-dropdown"></div>
                    </div>
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-medium text-slate-700" id="topbar-user-name">—</p>
                        <p class="text-xs text-slate-400" id="topbar-user-role">—</p>
                    </div>
                    <button id="btn-logout" class="btn btn-outline btn-sm">
                        <i class="bi bi-box-arrow-right"></i>
                        <span class="hidden sm:inline">Salir</span>
                    </button>
                </div>
            </header>

            <main id="page-content">
                <!-- nav de tabs -->
                <div class="tab-list" role="tablist">
                    <button id="tab-btn-users" class="tab-btn active" role="tab" aria-selected="true" aria-controls="tab-users" data-tab="tab-users">Usuarios</button>
                    <button id="tab-btn-user-roles" class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-user-roles" data-tab="tab-user-roles">Asignar Roles</button>
                </div>
                <!-- tabs/ -->
            </main>
        </div>
    </div>

    <script src="/view/assets/js/app.js"></script>
    <script src="/view/pages/security/usuarios/usuarios.js"></script>
</body>

</html>
