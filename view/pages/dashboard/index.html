<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio — Conta⅃ink</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=Sora:wght@600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/view/assets/css/app.css?v=2">
    <link rel="icon" href="/view/assets/img/Isotipo.svg" type="image/svg+xml">
    <!-- google tag -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-H55HB0QW2W"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag("js", new Date());
        gtag("config", "G-H55HB0QW2W");
    </script>
</head>

<body>
    <div id="app">
        <!-- sidebar -->
        <aside id="sidebar"></aside>

        <div id="main">
            <header id="topbar">
                <div class="flex items-center gap-3">
                    <button id="sidebar-toggle" class="btn btn-outline btn-icon" aria-label="Abrir menú de navegación">
                        <i class="bi bi-list text-lg" aria-hidden="true"></i>
                    </button>
                    <h1 class="text-base font-semibold text-slate-700">Inicio</h1>
                </div>
                <div class="flex items-center gap-4">
                    <!-- notificaciones -->
                    <div class="relative" id="notif-wrapper">
                        <button class="btn btn-outline btn-icon btn-sm" id="btn-notif" aria-label="Notificaciones"
                            aria-haspopup="true" aria-expanded="false">
                            <i class="bi bi-bell" aria-hidden="true"></i>
                            <span class="notif-badge hidden" id="notif-count" aria-hidden="true">0</span>
                        </button>
                        <div class="notif-dropdown hidden" id="notif-dropdown"></div>
                    </div>
                </div>
            </header>

            <main id="page-content">
                <!-- greeting -->
                <div class="mb-8">
                    <h2 id="welcome-title">Bienvenido</h2>
                    <p class="text-sm text-slate-400 mt-1.5" id="welcome-date"></p>
                </div>

                <!-- stats -->
                <div class="dash-stats mb-6" id="stats-grid">
                    <div class="card p-6 dash-stat-primary">
                        <p class="dash-stat-label">Declaraciones</p>
                        <p class="dash-stat-value" id="stat-decl">—</p>
                        <p class="dash-stat-hint">en el sistema</p>
                    </div>
                    <div class="card p-6">
                        <p class="dash-stat-label">Clientes</p>
                        <p class="dash-stat-value" id="stat-clients">—</p>
                        <p class="dash-stat-hint">registrados</p>
                    </div>
                    <div class="card p-5 dash-stat-admin">
                        <div class="flex-1 text-center">
                            <p class="dash-stat-label">Usuarios</p>
                            <p class="dash-stat-mini-value" id="stat-users">—</p>
                        </div>
                        <div class="dash-stat-divider"></div>
                        <div class="flex-1 text-center">
                            <p class="dash-stat-label">Roles</p>
                            <p class="dash-stat-mini-value" id="stat-roles">—</p>
                        </div>
                    </div>
                </div>

                <!-- quick actions + recent declarations -->
                <div class="dash-cols mb-6">
                    <div class="card p-5">
                        <h3>Acciones rápidas</h3>
                        <nav>
                            <a href="/view/pages/declaraciones/index.html" class="quick-action">
                                <i class="bi bi-file-earmark-plus"></i>
                                <span>Nueva Declaración</span>
                                <i class="bi bi-arrow-right"></i>
                            </a>
                            <a href="/view/pages/clientes/index.html" class="quick-action">
                                <i class="bi bi-person-plus"></i>
                                <span>Nuevo Cliente</span>
                                <i class="bi bi-arrow-right"></i>
                            </a>
                            <a href="/view/pages/security/usuarios/index.html" class="quick-action">
                                <i class="bi bi-person-gear"></i>
                                <span>Nuevo Usuario</span>
                                <i class="bi bi-arrow-right"></i>
                            </a>
                            <a href="/view/pages/security/roles/index.html" class="quick-action">
                                <i class="bi bi-shield-plus"></i>
                                <span>Nuevo Rol</span>
                                <i class="bi bi-arrow-right"></i>
                            </a>
                        </nav>
                    </div>

                    <div class="card p-5">
                        <div class="card-header-row flex items-center justify-between mb-4">
                            <h3>Declaraciones recientes</h3>
                            <a href="/view/pages/declaraciones/index.html"
                                class="text-xs font-medium text-blue-600 hover:text-blue-800 transition-colors">
                                Ver todas <i class="bi bi-arrow-right"></i>
                            </a>
                        </div>
                        <div class="carousel-wrapper">
                            <button class="carousel-btn prev" id="carousel-prev" aria-label="Anterior" disabled>
                                <i class="bi bi-chevron-left" aria-hidden="true"></i>
                            </button>
                            <div class="carousel-track-outer">
                                <div class="carousel-track" id="carousel-track">
                                    <div class="flex items-center gap-2 py-6 text-slate-400 w-full justify-center">
                                        <div class="spinner"></div>
                                        <span class="text-sm">Cargando...</span>
                                    </div>
                                </div>
                            </div>
                            <button class="carousel-btn next" id="carousel-next" aria-label="Siguiente" disabled>
                                <i class="bi bi-chevron-right" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- modal detalle declaracion -->
    <div id="modal-dash-decl" class="modal-backdrop hidden" role="dialog" aria-modal="true"
        aria-labelledby="dash-decl-title">
        <div class="modal-box" style="max-width:520px">
            <div class="modal-header">
                <h3 class="font-semibold text-slate-800" id="dash-decl-title">Declaración</h3>
                <button class="btn btn-outline btn-icon btn-sm" id="btn-close-dash-decl" type="button"
                    aria-label="Cerrar">
                    <i class="bi bi-x-lg" aria-hidden="true"></i>
                </button>
            </div>
            <div class="modal-body" id="dash-decl-content">
                <div class="flex items-center gap-2 py-6 text-slate-400 justify-center">
                    <div class="spinner"></div>
                    <span class="text-sm">Cargando...</span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="btn-cancel-dash-decl" type="button">Cerrar</button>
                <a id="dash-decl-link" href="/view/pages/declaraciones/index.html" class="btn btn-primary">
                    <i class="bi bi-arrow-right-circle"></i> Ver en Declaraciones
                </a>
            </div>
        </div>
    </div>

    <script src="/view/assets/js/app.js?v=2"></script>
    <script src="/view/pages/dashboard/dashboard.js?v=4"></script>
</body>

</html>
